<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather App</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #1a7bd0, #224f76);
    color: white;
    text-align: center;
    transition: 0.3s;
}

.dark {
    background: #111;
}

.container {
    margin-top: 30px;
}

input {
    padding: 10px;
    width: 220px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.card {
    margin: 20px auto;
    padding: 20px;
    width: 320px;
    border-radius: 15px;
    background: rgba(255,255,255,0.2);
}

canvas {
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>🌦 Weather App</h2>

<div class="container">
    <input id="city" placeholder="Enter city">
    <button onclick="getWeather()">Search</button>
    <button onclick="getLocation()">📍 Location</button>
    <button onclick="toggleTheme()">🌗 Mode</button>

    <div id="time"></div>
    <div id="history"></div>

    <div id="weather" class="card"></div>

    <canvas id="chart" width="300" height="200"></canvas>
</div>

<script>
const apiKey = "YOUR_API_KEY";

let chart;

document.getElementById("city").addEventListener("keypress", e => {
    if (e.key === "Enter") getWeather();
});

setInterval(() => {
    document.getElementById("time").innerText =
        "🕒 " + new Date().toLocaleString();
}, 1000);

function toggleTheme(){
    document.body.classList.toggle("dark");
}

function saveCity(city){
    let arr = JSON.parse(localStorage.getItem("cities")) || [];
    if(!arr.includes(city)){
        arr.push(city);
        localStorage.setItem("cities", JSON.stringify(arr));
    }
    showHistory();
}

function showHistory(){
    let arr = JSON.parse(localStorage.getItem("cities")) || [];
    document.getElementById("history").innerHTML =
        arr.map(c => `<button onclick="quickSearch('${c}')">${c}</button>`).join("");
}

function quickSearch(city){
    document.getElementById("city").value = city;
    getWeather();
}

async function getWeather(){
    if(apiKey === "YOUR_API_KEY"){
        alert("Please add your API key");
        return;
    }

    let city = document.getElementById("city").value;
    if(!city) return alert("Enter city");

    saveCity(city);

    let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;
    
    try {
        let res = await fetch(url);
        let data = await res.json();

        if(data.cod != 200){
            document.getElementById("weather").innerHTML = "City not found";
            return;
        }

        display(data);
        getForecast(city);
    } catch {
        document.getElementById("weather").innerHTML = "Error fetching data";
    }
}

function getLocation(){
    if(apiKey === "YOUR_API_KEY"){
        alert("Please add your API key");
        return;
    }

    navigator.geolocation.getCurrentPosition(async pos => {
        let {latitude, longitude} = pos.coords;

        let url = `https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=${apiKey}&units=metric`;
        
        let res = await fetch(url);
        let data = await res.json();

        display(data);
        getForecast(data.name);
    },
    () => alert("Location access denied"));
}

function display(data){
    document.getElementById("weather").innerHTML = `
        <h3>${data.name}</h3>
        <p>🌡 ${data.main.temp}°C</p>
        <p>☁ ${data.weather[0].description}</p>
        <p>💧 ${data.main.humidity}%</p>
        <p>💨 ${data.wind.speed} m/s</p>
    `;

    if(data.weather[0].main === "Clear"){
        document.body.style.background = "linear-gradient(135deg,#56ccf2,#2f80ed)";
    } else if(data.weather[0].main === "Clouds"){
        document.body.style.background = "linear-gradient(135deg,#757f9a,#d7dde8)";
    }
}

async function getForecast(city){
    let url = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`;
    let res = await fetch(url);
    let data = await res.json();

    let temps = data.list.slice(0,8).map(i => i.main.temp);
    let labels = data.list.slice(0,8).map(i => i.dt_txt.split(" ")[1]);

    renderChart(labels, temps);
}

function renderChart(labels, temps){
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Temperature °C",
                data: temps
            }]
        }
    });
}

showHistory();
</script>

</body>
</html>
